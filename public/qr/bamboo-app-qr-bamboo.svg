  </g>

  <!-- Pallini decorativi agli angoli QR -->
  <circle cx="136" cy="316" r="5" fill="#8b6340"/>
  <circle cx="664" cy="316" r="5" fill="#8b6340"/>
  <circle cx="136" cy="844" r="5" fill="#8b6340"/>
  <circle cx="664" cy="844" r="5" fill="#8b6340"/>

  <!-- CTA principale -->
  <text x="400" y="898"
        text-anchor="middle"
        font-family="'Georgia', serif"
        font-size="28" font-style="italic" font-weight="400"
        fill="#1a1a10">
    Prenota un tavolo
  </text>

  <!-- CTA multilingua -->
  <text x="400" y="932"
        text-anchor="middle"
        font-family="'Inter', Arial, sans-serif"
        font-size="14" font-weight="400"
        fill="#5a5040" letter-spacing="0.3">
    Book a table · Réserver une table · Tisch reservieren
  </text>

  <!-- Footer -->
  <g transform="translate(400, 1018)" text-anchor="middle"
     font-family="'Inter', Arial, sans-serif">
    <line x1="-70" y1="0" x2="-18" y2="0" stroke="#8b6340" stroke-opacity="0.40" stroke-width="1"/>
    <circle cx="0" cy="-1" r="3" fill="#8b6340" fill-opacity="0.8"/>
    <line x1="18" y1="0" x2="70" y2="0" stroke="#8b6340" stroke-opacity="0.40" stroke-width="1"/>
    <text y="26" font-size="11" letter-spacing="4.5" fill="#5a5040">
      LECCE · PUGLIA · ITALIA
    </text>
    <text y="48" font-size="10" letter-spacing="2.5" fill="#5a5040" fill-opacity="0.70">
