<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="800" height="1100">
  <defs>
    <!-- Sfondo caldo crema -->
    <linearGradient id="bgGradB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f4ec"/>
      <stop offset="100%" stop-color="#f3efe3"/>
    </linearGradient>
    <!-- Alone verde bamboo in alto -->
    <radialGradient id="glowB1" cx="50%" cy="8%" r="55%">
      <stop offset="0%" stop-color="#3f7d3a" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#3f7d3a" stop-opacity="0"/>
    </radialGradient>
    <!-- Alone wood in basso -->
    <radialGradient id="glowB2" cx="50%" cy="95%" r="45%">
      <stop offset="0%" stop-color="#8b6340" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8b6340" stop-opacity="0"/>
    </radialGradient>
    <!-- Gradient verde per titolo -->
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a5626"/>
      <stop offset="100%" stop-color="#3f7d3a"/>
    </linearGradient>
  </defs>

  <!-- Sfondo -->
  <rect width="800" height="1100" fill="url(#bgGradB)"/>
  <rect width="800" height="1100" fill="url(#glowB1)"/>
  <rect width="800" height="1100" fill="url(#glowB2)"/>

  <!-- Cornice decorativa doppia — in verde scuro -->
  <rect x="24" y="24" width="752" height="1052" fill="none"
        stroke="#2a5626" stroke-opacity="0.20" stroke-width="1.2"/>
  <rect x="37" y="37" width="726" height="1026" fill="none"
        stroke="#8b6340" stroke-opacity="0.28" stroke-width="0.8"/>

  <!-- Angoli decorativi in wood -->
  <!-- TL -->
  <line x1="24" y1="80" x2="24" y2="24" stroke="#3f7d3a" stroke-opacity="0.75" stroke-width="2.5"/>
  <line x1="24" y1="24" x2="80" y2="24" stroke="#3f7d3a" stroke-opacity="0.75" stroke-width="2.5"/>
  <!-- TR -->
  <line x1="776" y1="80" x2="776" y2="24" stroke="#3f7d3a" stroke-opacity="0.75" stroke-width="2.5"/>
  <line x1="720" y1="24" x2="776" y2="24" stroke="#3f7d3a" stroke-opacity="0.75" stroke-width="2.5"/>
  <!-- BL -->
  <line x1="24" y1="1020" x2="24" y2="1076" stroke="#3f7d3a" stroke-opacity="0.75" stroke-width="2.5"/>
  <line x1="24" y1="1076" x2="80" y2="1076" stroke="#3f7d3a" stroke-opacity="0.75" stroke-width="2.5"/>
  <!-- BR -->
  <line x1="776" y1="1020" x2="776" y2="1076" stroke="#3f7d3a" stroke-opacity="0.75" stroke-width="2.5"/>
  <line x1="720" y1="1076" x2="776" y2="1076" stroke="#3f7d3a" stroke-opacity="0.75" stroke-width="2.5"/>

  <!-- Motivo bamboo stilizzato sinistra -->
  <g stroke="#3f7d3a" stroke-opacity="0.12" stroke-width="3" fill="none">
    <line x1="62" y1="60" x2="62" y2="1040"/>
    <line x1="72" y1="60" x2="72" y2="1040"/>
    <line x1="62" y1="200" x2="72" y2="200"/>
    <line x1="62" y1="380" x2="72" y2="380"/>
    <line x1="62" y1="560" x2="72" y2="560"/>
    <line x1="62" y1="740" x2="72" y2="740"/>
    <line x1="62" y1="920" x2="72" y2="920"/>
  </g>
  <!-- Motivo bamboo stilizzato destra -->
  <g stroke="#3f7d3a" stroke-opacity="0.12" stroke-width="3" fill="none">
    <line x1="738" y1="60" x2="738" y2="1040"/>
    <line x1="728" y1="60" x2="728" y2="1040"/>
    <line x1="728" y1="200" x2="738" y2="200"/>
    <line x1="728" y1="380" x2="738" y2="380"/>
    <line x1="728" y1="560" x2="738" y2="560"/>
    <line x1="728" y1="740" x2="738" y2="740"/>
    <line x1="728" y1="920" x2="738" y2="920"/>
  </g>

  <!-- Eyebrow + separatore -->
  <g transform="translate(400, 110)" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif">
    <line x1="-90" y1="0" x2="-22" y2="0" stroke="#8b6340" stroke-opacity="0.50" stroke-width="1"/>
    <circle cx="0" cy="-1" r="3.5" fill="#8b6340"/>
    <line x1="22" y1="0" x2="90" y2="0" stroke="#8b6340" stroke-opacity="0.50" stroke-width="1"/>
    <text y="26" font-size="13" letter-spacing="5.5" fill="#2a5626" fill-opacity="0.75" font-weight="600">
      COCKTAIL BAR · LECCE
    </text>
  </g>

  <!-- Titolo BAMBOO -->
  <text x="400" y="228"
        text-anchor="middle"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="108" font-weight="700" letter-spacing="5"
        fill="url(#greenGrad)">
    BAMBOO
  </text>

  <!-- Linea sottotitolo -->
  <line x1="260" y1="255" x2="540" y2="255"
        stroke="#8b6340" stroke-opacity="0.28" stroke-width="1"/>

  <!-- Testo intro -->
  <text x="400" y="295"
        text-anchor="middle"
        font-family="'Georgia', serif"
        font-size="18" font-style="italic" font-weight="300"
        fill="#5a5040" letter-spacing="1">
    Prenota il tuo tavolo
  </text>

